name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Fix Android Assets
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          mkdir -p android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          for dir in android/app/src/main/res/mipmap-*/; do
            for file in "$dir"*.png; do
              if [ -f "$file" ]; then
                echo "Processing: $file"
                convert "$file" -strip "$file.tmp" && mv "$file.tmp" "$file" || echo "Failed to process $file"
              fi
            done
          done
          echo "Assets validados"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
          validate-wrappers: false

      - name: Install Android Platform 36 & Build Tools 36
        run: |
          echo "y" | sdkmanager --install "platforms;android-36" "build-tools;36.0.0" || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Build Android Release (APK & AAB)
        working-directory: android
        run: |
          ./gradlew clean assembleRelease bundleRelease --stacktrace

      - name: Collect Android Artifacts
        run: |
          mkdir -p build-artifacts
          APK_SRC=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -n "$APK_SRC" ]; then
            cp "$APK_SRC" build-artifacts/app-release.apk
            echo "Successfully collected APK: $APK_SRC"
          else
            APK_FALLBACK=$(find android/app/build/outputs/ -name "*.apk" | head -n 1)
            if [ -n "$APK_FALLBACK" ]; then
              cp "$APK_FALLBACK" build-artifacts/app-release.apk
              echo "Collected fallback APK: $APK_FALLBACK"
            else
              echo "Error: No release APK found!"
              exit 1
            fi
          fi
          AAB_SRC=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          if [ -n "$AAB_SRC" ]; then
            cp "$AAB_SRC" build-artifacts/app-release.aab
            echo "Successfully collected AAB: $AAB_SRC"
          else
            AAB_FALLBACK=$(find android/app/build/outputs/ -name "*.aab" | head -n 1)
            if [ -n "$AAB_FALLBACK" ]; then
              cp "$AAB_FALLBACK" build-artifacts/app-release.aab
              echo "Collected fallback AAB: $AAB_FALLBACK"
            else
              echo "Error: No release AAB found!"
              exit 1
            fi
          fi

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build-artifacts/app-release.apk
          if-no-files-found: error

      - name: Upload Android AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build-artifacts/app-release.aab
          if-no-files-found: error
