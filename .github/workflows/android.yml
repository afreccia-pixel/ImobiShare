name: Build Android App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: zulu
          cache: gradle

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generate splash screens
        run: |
          echo "🗑️ Deletando splash antigos..."
          find android/app/src/main/res/drawable-* -name "splash.png" -delete 2>/dev/null || true

          echo "🎨 Preparando imagem base do splash..."
          if [ -f "assets/splash.png" ]; then
            cp assets/splash.png /tmp/splash.png
          else
            convert -size 1024x1024 xc:"#2196F3" \
              -pointsize 120 -fill white -gravity center -annotate +0+0 "iMobi" \
              /tmp/splash.png
          fi

          declare -A PORT_SIZES=(
            [mdpi]="320x480"
            [hdpi]="480x800"
            [xhdpi]="800x1280"
            [xxhdpi]="1080x1920"
            [xxxhdpi]="1440x2560"
          )

          declare -A LAND_SIZES=(
            [mdpi]="480x320"
            [hdpi]="800x480"
            [xhdpi]="1280x800"
            [xxhdpi]="1920x1080"
            [xxxhdpi]="2560x1440"
          )

          for density in "${!PORT_SIZES[@]}"; do
            mkdir -p "android/app/src/main/res/drawable-port-$density"
            mkdir -p "android/app/src/main/res/drawable-land-$density"
            convert /tmp/splash.png -resize "${PORT_SIZES[$density]}" \
              "android/app/src/main/res/drawable-port-$density/splash.png"
            convert /tmp/splash.png -resize "${LAND_SIZES[$density]}" \
              "android/app/src/main/res/drawable-land-$density/splash.png"
          done

          mkdir -p android/app/src/main/res/drawable
          cp /tmp/splash.png android/app/src/main/res/drawable/splash.png

      - name: Generate launcher icons
        run: |
          find android/app/src/main/res/mipmap-* -name "ic_launcher*.png" -delete 2>/dev/null || true
          mkdir -p android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}

          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png /tmp/ic_launcher.png
          else
            convert -size 512x512 xc:"#2196F3" \
              -pointsize 80 -fill white -gravity center -annotate +0+0 "iMobi" \
              /tmp/ic_launcher.png
          fi

          declare -A SIZES=(
            [mdpi]=48
            [hdpi]=72
            [xhdpi]=96
            [xxhdpi]=144
            [xxxhdpi]=192
          )

          for density in "${!SIZES[@]}"; do
            size=${SIZES[$density]}
            dir="android/app/src/main/res/mipmap-$density"

            for icon_name in ic_launcher ic_launcher_round ic_launcher_foreground; do
              convert /tmp/ic_launcher.png -resize "${size}x${size}" \
                "$dir/$icon_name.png"
            done
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Fix corrupted Gradle Wrapper jar
        working-directory: android
        run: |
          GRADLE_VERSION=$(grep -oP '(?<=gradle-)[0-9]+\.[0-9]+(\.[0-9]+)?(?=-)' gradle/wrapper/gradle-wrapper.properties)
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          file gradle/wrapper/gradle-wrapper.jar

      - name: Install Android Platform 36 and Build Tools 36
        run: |
          echo "y" | sdkmanager --install "platforms;android-36" "build-tools;36.0.0" || \
          echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platforms;android-36" "build-tools;36.0.0"

      - name: Grant Execute Permission to Gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK de release
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Assinar APK de release
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/imobishare.keystore"

          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -f -p 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "$RUNNER_TEMP/app-release-aligned.apk"

          "$ANDROID_HOME/build-tools/36.0.0/apksigner" sign \
            --ks "$RUNNER_TEMP/imobishare.keystore" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out android/app/build/outputs/apk/release/imobishare-release.apk \
            "$RUNNER_TEMP/app-release-aligned.apk"

          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose \
            android/app/build/outputs/apk/release/imobishare-release.apk

      - name: Publicar APK assinado
        uses: actions/upload-artifact@v4
        with:
          name: imobishare-release
          path: android/app/build/outputs/apk/release/imobishare-release.apk
          if-no-files-found: error
          
      - name: Instalar ferramenta de envio ao Google Drive
        if: github.event_name == 'push'
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Enviar APK assinado ao Google Drive
        if: github.event_name == 'push'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail

          KEY_FILE="$RUNNER_TEMP/google-drive-service-account.json"

          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > "$KEY_FILE"

          rclone config create gdrive drive \
            scope drive \
            service_account_file "$KEY_FILE" \
            root_folder_id "$GOOGLE_DRIVE_FOLDER_ID" \
            --non-interactive

          rclone copy \
            android/app/build/outputs/apk/release/imobishare-release.apk \
            gdrive: \
            --checksum \
            --progress
