name: Build Android App  #

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
      - name: Regenerate main splash
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          echo "🎨 Gerando splash principal..."
          convert -size 1024x1024 xc:"#2196F3" \
            -pointsize 120 -fill white -gravity center -annotate +0+0 "iMobi" \
            android/app/src/main/res/drawable/splash.png
          echo "✅ Splash principal recriado!"

      - name: Generate splash screens
        run: |
          echo "🗑️ Deletando splash antigos..."
          find android/app/src/main/res/drawable-* -name "splash.png" -delete 2>/dev/null || true

          echo "🎨 Gerando imagem base do splash..."
          convert -size 1024x1024 xc:"#2196F3" \
            -pointsize 120 -fill white -gravity center -annotate +0+0 "iMobi" \
            /tmp/splash.png

          echo "📱 Convertendo splash para todas densidades..."
          convert /tmp/splash.png -resize 320x480 android/app/src/main/res/drawable-port-mdpi/splash.png
          convert /tmp/splash.png -resize 480x800 android/app/src/main/res/drawable-port-hdpi/splash.png
          convert /tmp/splash.png -resize 800x1280 android/app/src/main/res/drawable-port-xhdpi/splash.png
          convert /tmp/splash.png -resize 1080x1920 android/app/src/main/res/drawable-port-xxhdpi/splash.png
          convert /tmp/splash.png -resize 1440x2560 android/app/src/main/res/drawable-port-xxxhdpi/splash.png
          convert /tmp/splash.png -resize 480x320 android/app/src/main/res/drawable-land-mdpi/splash.png
          convert /tmp/splash.png -resize 800x480 android/app/src/main/res/drawable-land-hdpi/splash.png
          convert /tmp/splash.png -resize 1280x800 android/app/src/main/res/drawable-land-xhdpi/splash.png
          convert /tmp/splash.png -resize 1920x1080 android/app/src/main/res/drawable-land-xxhdpi/splash.png
          convert /tmp/splash.png -resize 2560x1440 android/app/src/main/res/drawable-land-xxxhdpi/splash.png

          echo "✅ Splash screens gerados com sucesso!"
          ls -la android/app/src/main/res/drawable-*/splash.png

      - name: Generate launcher icons
        run: |
          echo "🗑️ Deletando imagens antigas..."
          find android/app/src/main/res/mipmap-* -name "ic_launcher*.png" -delete 2>/dev/null || true

          echo "📁 Criando pastas..."
          mkdir -p android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}

          echo "🎨 Gerando imagem base..."
          convert -size 512x512 xc:"#2196F3" \
            -pointsize 80 -fill white -gravity center -annotate +0+0 "iMobi" \
            /tmp/ic_launcher.png

          echo "📱 Convertendo para todas densidades..."
          convert /tmp/ic_launcher.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          echo "✅ Ícones gerados com sucesso!"
          ls -la android/app/src/main/res/mipmap-mdpi/ic_launcher*.png

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Install Android Platform 36 & Build Tools 36
        run: |
          echo "y" | sdkmanager --install "platforms;android-36" "build-tools;36.0.0" || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Build Android Release (APK & AAB)
        working-directory: android
        run: ./gradlew clean assembleRelease bundleRelease --stacktrace

      - name: Collect Android Artifacts
        run: |
          mkdir -p build-artifacts
          APK_SRC=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -n "$APK_SRC" ]; then
            cp "$APK_SRC" build-artifacts/app-release.apk
            echo "Successfully collected APK: $APK_SRC"
          else
            APK_FALLBACK=$(find android/app/build/outputs/ -name "*.apk" | head -n 1)
            if [ -n "$APK_FALLBACK" ]; then
              cp "$APK_FALLBACK" build-artifacts/app-release.apk
              echo "Collected fallback APK: $APK_FALLBACK"
            else
              echo "Error: No release APK found!"
              exit 1
            fi
          fi
          AAB_SRC=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          if [ -n "$AAB_SRC" ]; then
            cp "$AAB_SRC" build-artifacts/app-release.aab
            echo "Successfully collected AAB: $AAB_SRC"
          else
            AAB_FALLBACK=$(find android/app/build/outputs/ -name "*.aab" | head -n 1)
            if [ -n "$AAB_FALLBACK" ]; then
              cp "$AAB_FALLBACK" build-artifacts/app-release.aab
              echo "Collected fallback AAB: $AAB_FALLBACK"
            else
              echo "Error: No release AAB found!"
              exit 1
            fi
          fi

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build-artifacts/app-release.apk
          if-no-files-found: error

      - name: Upload Android AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build-artifacts/app-release.aab
          if-no-files-found: error
