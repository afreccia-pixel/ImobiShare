name: Build Android

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      ## ✅ PRIMEIRO: Instalar ImageMagick
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick
      
      ## ✅ SEGUNDO: Deletar e gerar imagens ANTES do build
      - name: Generate launcher icons
        run: |
          echo "🗑️  Deletando imagens antigas..."
          find android/app/src/main/res/mipmap-* -name "ic_launcher*.png" -delete 2>/dev/null || true
          
          echo "📁 Criando pastas..."
          mkdir -p android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          
          echo "🎨 Gerando imagem base..."
          convert -size 512x512 xc:"#2196F3" \
          -pointsize 80 -fill white -gravity center -annotate +0+0 "iMobi" \
          /tmp/ic_launcher.png
          
          echo "📱 Convertendo para todas densidades..."
          convert /tmp/ic_launcher.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert /tmp/ic_launcher.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/ic_launcher.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          
          echo "✅ Ícones gerados com sucesso!"
          ls -la android/app/src/main/res/mipmap-mdpi/ic_launcher*.png
      
      ## ✅ TERCEIRO: Agora sim o build
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Clean gradle
        run: cd android && ./gradlew clean
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Build Bundle
        run: flutter build appbundle --release
